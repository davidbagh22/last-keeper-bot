name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m compileall -q app.py admin_access.py admin_home.py admin_tools.py expert_ux.py location_hosts.py partners.py polish_v5.py production_v4.py main.py config.py game_data.py storage.py route_config.py team_games.py team_quest.py quest_common.py quest_control.py quest_route.py quest_games.py quest_admin.py ui_text.py
      - run: python -m unittest discover -s tests -v
